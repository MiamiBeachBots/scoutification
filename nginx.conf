events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---------------------------------------------------------------
    # Main scouting site: scout.thaliathenerd.dev
    # Serves: QR code forms (index.html, pit.html), scanner.html
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name scout.thaliathenerd.dev localhost 127.0.0.1;

        root /usr/share/nginx/html;
        index index.html;

        # Static files
        location / {
            try_files $uri $uri/ =404;

            # Config + app JS — short cache so game updates show immediately
            location ~* ^/(config|app)\.js$ {
                expires 1h;
                add_header Cache-Control "public, must-revalidate";
            }
            # Static libraries — long immutable cache
            location ~* ^/(qrcode|html5-qrcode)\.min\.js$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Proxy API requests to FastAPI backend
        location /api/ {
            proxy_pass http://frc-scout-backend:8000;
        }

        # Health check passthrough
        location = /health {
            proxy_pass http://frc-scout-backend:8000/;
        }
    }

    # ---------------------------------------------------------------
    # Direct submit site: submit.scout.thaliathenerd.dev
    # For scouters who have WiFi — fills form and submits directly,
    # no QR code / middleman needed.
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name scoutsubmit.thaliathenerd.dev;

        root /usr/share/nginx/html;
        index submit.html;

        # Only expose submit.html and shared JS/static assets
        location / {
            try_files $uri $uri/ /submit.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Proxy API requests to FastAPI backend
        location /api/ {
            proxy_pass http://frc-scout-backend:8000;
        }
    }
}
