version: '3.8'

services:
  # Frontend - Nginx serving static files
  frontend:
    image: nginx:alpine
    container_name: frc-scout-frontend
    ports:
      - "10081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - homelab-net
    restart: unless-stopped

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frc-scout-backend
    ports:
      - "10082:8000"
    volumes:
      - scout-db:/data
    environment:
      - DB_PATH=/data/scouting_data.db
    networks:
      - homelab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dashboard - Streamlit
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: frc-scout-dashboard
    ports:
      - "10083:8501"
    volumes:
      - scout-db:/data
    environment:
      - DB_PATH=/data/scouting_data.db
    networks:
      - homelab-net
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  scout-db:
    name: scout-db

networks:
  homelab-net:
    name: homelab-net
    external: true
